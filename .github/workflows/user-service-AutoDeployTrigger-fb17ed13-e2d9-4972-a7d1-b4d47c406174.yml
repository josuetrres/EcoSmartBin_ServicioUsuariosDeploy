name: Trigger auto deployment for user-service

on:
  push:
    branches: 
      [ main ]
    paths:
    - '**'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.USERSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.USERSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.USERSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Instalar extensión de Azure Container App
        run: |
          az extension add --name containerapp --upgrade --yes

      - name: Desplegar directamente usando el código fuente limpio
        run: |
          az containerapp up \
            --name user-service \
            --resource-group ecosmart \
            --source . \
            --ingress external \
            --target-port 8000